name: Deploy to Stage

on:
  push:
    branches:
      - stage

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: cd client && npm install
      
      - name: Build project
        run: cd client && npm run build
      
      - name: Run Tests (Verification)
        run: cd client && npm run test -- --passWithNoTests || true
      
      - name: Lint Code (Code Quality Check)
        run: cd client && npm run lint || true
      
      - name: Trigger Vercel Deployment (Staging)
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_STAGE }}
      
      - name: Wait for Staging Deployment
        run: |
          echo "⏳ Staging deployment in progress..."
          sleep 10
          echo "✅ Staging deployment triggered successfully!"
